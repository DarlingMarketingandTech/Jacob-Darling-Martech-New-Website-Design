<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:30px 34px;background:var(--cream);font-family:var(--font-sans);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .badge{font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:8px 16px;border-radius:6px}
  .neutral{background:var(--charcoal);color:var(--cream)}
  .crimson{background:var(--crimson);color:#fff}
  .outline{background:transparent;color:var(--charcoal);border:1.5px solid var(--line-strong)}
  .pill{border-radius:999px}
</style>
</head>
<body>
  <div class="card">
    <span class="badge neutral">Strategy</span>
    <span class="badge neutral">Systems</span>
    <span class="badge crimson">Growth</span>
    <span class="badge outline pill">Automation</span>
    <span class="badge crimson pill">+212% Leads</span>
  </div>
</body>
</html>
