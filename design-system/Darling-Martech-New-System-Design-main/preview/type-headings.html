<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:26px 34px;background:var(--cream);font-family:var(--font-sans)}
  .row{display:flex;align-items:baseline;gap:16px;padding:9px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .spec{color:var(--charcoal)}
  .h1{font-weight:800;font-size:40px;letter-spacing:-.02em;line-height:1}
  .h2{font-weight:700;font-size:30px;letter-spacing:-.01em}
  .h3{font-weight:600;font-size:21px}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--fg3);white-space:nowrap;margin-left:auto}
</style>
</head>
<body>
  <div class="card">
    <div class="row"><span class="spec h1">Heading One</span><span class="tag">Archivo 800 · 40/clamp</span></div>
    <div class="row"><span class="spec h2">Heading Two</span><span class="tag">Archivo 700 · 30</span></div>
    <div class="row"><span class="spec h3">Heading Three</span><span class="tag">Archivo 600 · 21</span></div>
  </div>
</body>
</html>
