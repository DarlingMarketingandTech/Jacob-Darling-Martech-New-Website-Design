<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:28px 32px;background:var(--cream);
    display:flex;align-items:center;gap:32px;font-family:var(--font-sans)}
  .card img{height:150px;width:auto}
  .meta{display:flex;flex-direction:column;gap:10px}
  .meta .name{font-weight:900;font-size:20px;color:var(--charcoal);letter-spacing:-.01em}
  .tag{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--crimson)}
  .swatch-row{display:flex;gap:6px;margin-top:4px}
  .sw{width:26px;height:26px;border-radius:4px;border:1px solid rgba(0,0,0,.08)}
</style>
</head>
<body>
  <div class="card">
    <img src="../assets/logo-primary-stacked.png" alt="Darling Martech primary logo">
    <div class="meta">
      <div class="tag">Primary Logo</div>
      <div class="name">DM monogram + wordmark</div>
      <div class="swatch-row">
        <div class="sw" style="background:#990000"></div>
        <div class="sw" style="background:#11151C"></div>
        <div class="sw" style="background:#0B1320"></div>
        <div class="sw" style="background:#F5F3EE"></div>
      </div>
    </div>
  </div>
</body>
</html>
