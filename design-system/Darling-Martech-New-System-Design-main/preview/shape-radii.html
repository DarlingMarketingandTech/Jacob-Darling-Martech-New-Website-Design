<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:28px 34px;background:var(--cream);font-family:var(--font-sans);display:flex;align-items:flex-end;gap:18px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:var(--crimson)}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--fg3)}
</style>
</head>
<body>
  <div class="card">
    <div class="item"><div class="box" style="width:56px;height:56px;border-radius:4px"></div><div class="nm">sm · 4px</div></div>
    <div class="item"><div class="box" style="width:56px;height:56px;border-radius:8px"></div><div class="nm">md · 8px</div></div>
    <div class="item"><div class="box" style="width:56px;height:56px;border-radius:14px"></div><div class="nm">lg · 14px</div></div>
    <div class="item"><div class="box" style="width:96px;height:40px;border-radius:999px"></div><div class="nm">pill · 999px</div></div>
  </div>
</body>
</html>
