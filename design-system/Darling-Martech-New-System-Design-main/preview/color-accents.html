<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:26px 30px;background:var(--cream);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
  .chip{display:flex;flex-direction:column}
  .sw{height:78px;border-radius:6px;border:1px solid rgba(17,21,28,.10)}
  .nm{font-weight:700;font-size:11px;color:var(--charcoal);margin-top:8px;line-height:1.15}
  .hex{font-family:var(--font-mono);font-size:9.5px;color:var(--fg3);margin-top:2px}
</style>
</head>
<body>
  <div class="card">
    <div class="grid">
      <div class="chip"><div class="sw" style="background:#6B0F1A"></div><div class="nm">Burgundy</div><div class="hex">#6B0F1A</div></div>
      <div class="chip"><div class="sw" style="background:#B14B5A"></div><div class="nm">Dusty Rose</div><div class="hex">#B14B5A</div></div>
      <div class="chip"><div class="sw" style="background:#C47E61"></div><div class="nm">Clay</div><div class="hex">#C47E61</div></div>
      <div class="chip"><div class="sw" style="background:#B88F97"></div><div class="nm">Warm Gray</div><div class="hex">#B88F97</div></div>
      <div class="chip"><div class="sw" style="background:#3A4A63"></div><div class="nm">Slate Blue</div><div class="hex">#3A4A63</div></div>
      <div class="chip"><div class="sw" style="background:#617D99"></div><div class="nm">Steel Blue</div><div class="hex">#617D99</div></div>
      <div class="chip"><div class="sw" style="background:#6F7F76"></div><div class="nm">Cool Sage</div><div class="hex">#6F7F76</div></div>
      <div class="chip"><div class="sw" style="background:#D7D2CA"></div><div class="nm">Light Taupe</div><div class="hex">#D7D2CA</div></div>
    </div>
  </div>
</body>
</html>
