<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:40px 50px;background:var(--cream);font-family:var(--font-sans);display:flex;flex-direction:column;gap:34px;align-items:center}
  .rule{display:flex;align-items:center;width:100%;gap:0}
  .rule .ln{flex:1;height:1.5px;background:var(--crimson)}
  .rule .dot{width:7px;height:7px;border-radius:50%;background:var(--crimson)}
  .rule.taper .ln{background:linear-gradient(90deg,transparent,var(--crimson))}
  .rule.taper .ln.r{background:linear-gradient(90deg,var(--crimson),transparent)}
  .cap{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--fg3)}
</style>
</head>
<body>
  <div class="card">
    <div class="rule"><div class="ln"></div><div class="dot"></div><div class="ln"></div></div>
    <div class="rule taper"><div class="ln"></div><div class="dot"></div><div class="ln r"></div></div>
    <div class="cap">Editorial crimson divider · centered dot terminal</div>
  </div>
</body>
</html>
