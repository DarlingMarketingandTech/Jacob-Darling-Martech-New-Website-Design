<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:30px 34px;background:var(--navy);
    background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);background-size:14px 14px}
  .eyebrow{font-family:var(--font-sans);font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-on-dark-3);margin-bottom:14px}
  .disp{font-family:var(--font-sans);font-weight:900;font-size:52px;line-height:.98;letter-spacing:-.02em;text-transform:uppercase;color:#F5F3EE;margin:0}
  .disp .c{color:#990000}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-on-dark-3);margin-top:16px}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Display · Archivo Black</div>
    <h1 class="disp">Solo marketer.<br>Strategic thinker.<br><span class="c">Systems builder.</span></h1>
    <div class="meta">Archivo 900 · uppercase · tracking -0.02em · line-height 0.98</div>
  </div>
</body>
</html>
