<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:34px;background:var(--cream);font-family:var(--font-sans);display:flex;gap:26px;align-items:center;justify-content:center}
  .e{width:150px;height:96px;background:#fff;border-radius:10px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;border:1px solid rgba(17,21,28,.05)}
  .sm{box-shadow:var(--shadow-sm)}
  .md{box-shadow:var(--shadow-md)}
  .lg{box-shadow:var(--shadow-lg)}
  .nm{font-family:var(--font-mono);font-size:10px;color:var(--fg3)}
</style>
</head>
<body>
  <div class="card">
    <div class="e sm"><span class="nm">shadow-sm</span></div>
    <div class="e md"><span class="nm">shadow-md</span></div>
    <div class="e lg"><span class="nm">shadow-lg</span></div>
  </div>
</body>
</html>
