<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:34px 38px;background:var(--cream);display:flex;gap:22px;align-items:flex-start}
  .bar{width:3px;align-self:stretch;background:var(--crimson);border-radius:2px}
  .q{font-family:var(--font-serif);font-weight:400;font-size:34px;line-height:1.18;letter-spacing:-.01em;color:var(--charcoal);margin:0}
  .q em{font-style:italic;color:var(--crimson)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-top:16px}
  .cite{font-family:var(--font-sans);font-weight:700;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg3);margin-top:10px}
</style>
</head>
<body>
  <div class="card">
    <div class="bar"></div>
    <div>
      <p class="q">Good strategy is the advantage. <em>Great systems</em> make it scalable.</p>
      <div class="cite">✻ Darling Martech</div>
      <div class="meta">Spectral · serif · editorial quotes &amp; display moments</div>
    </div>
  </div>
</body>
</html>
