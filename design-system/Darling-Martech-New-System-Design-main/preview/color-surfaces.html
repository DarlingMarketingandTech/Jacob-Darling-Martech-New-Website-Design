<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:24px 30px;background:var(--cream);font-family:var(--font-sans);
    display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .col{display:flex;flex-direction:column;gap:10px}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--fg3)}
  .row{display:flex;gap:10px}
  .tk{flex:1;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:4px;border:1px solid rgba(17,21,28,.08)}
  .tk .n{font-weight:700;font-size:12px}
  .tk .h{font-family:var(--font-mono);font-size:10px;opacity:.7}
</style>
</head>
<body>
  <div class="card">
    <div class="col">
      <div class="lbl">Light surfaces</div>
      <div class="tk" style="background:#F5F3EE;color:#11151C"><span class="n">bg-page · cream</span><span class="h">#F5F3EE</span></div>
      <div class="tk" style="background:#FFFFFF;color:#11151C"><span class="n">surface · white</span><span class="h">#FFFFFF</span></div>
      <div class="tk" style="background:#ECE9E1;color:#11151C"><span class="n">surface-sunken</span><span class="h">#ECE9E1</span></div>
    </div>
    <div class="col">
      <div class="lbl">Dark grounds</div>
      <div class="tk" style="background:#0B1320;color:#F5F3EE"><span class="n">bg-page-dark · navy</span><span class="h">#0B1320</span></div>
      <div class="tk" style="background:#11151C;color:#F5F3EE"><span class="n">charcoal</span><span class="h">#11151C</span></div>
      <div class="tk" style="background:#131C2B;color:#F5F3EE"><span class="n">surface-dark (raised)</span><span class="h">#131C2B</span></div>
    </div>
  </div>
</body>
</html>
