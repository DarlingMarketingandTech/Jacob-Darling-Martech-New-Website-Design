<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{width:700px;box-sizing:border-box;padding:30px 34px;background:var(--cream);font-family:var(--font-sans);display:flex;align-items:flex-end;gap:12px}
  .item{display:flex;flex-direction:column;gap:6px;align-items:center}
  .bar{background:var(--slate-blue);width:30px;border-radius:3px}
  .nm{font-family:var(--font-mono);font-size:9px;color:var(--fg3)}
</style>
</head>
<body>
  <div class="card">
    <div class="item"><div class="bar" style="height:4px"></div><div class="nm">1·4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="nm">2·8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="nm">3·12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="nm">4·16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="nm">5·24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="nm">6·32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="nm">7·48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="nm">8·64</div></div>
    <div class="item"><div class="bar" style="height:96px"></div><div class="nm">9·96</div></div>
    <div class="item"><div class="bar" style="height:128px"></div><div class="nm">10·128</div></div>
  </div>
</body>
</html>
